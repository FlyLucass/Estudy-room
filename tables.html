<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table {
            border: solid;
            text-align: center;
            border-collapse: collapse;
        }

        thead,
        tr,
        th {
            border: 2px solid;
        }

        tbody,
        tr,
        td {
            border: 1px solid;
        }
    </style>
</head>

<body>
    <main>
        <table>
            <thead>
                <tr>
                    <th>Date </th>
                    <th>Type</th>
                    <th>Description</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody>
                <!-- Linha seria coluna para cada tr aberto -->
                <!-- colspan="mesclacolunas" rowspan="mesclalinha" --> </td>
                <tr>
                    <td rowspan="2">15/06/2022 </td>
                    <td>Expense</td>
                    <td>food</td>
                    <td>35,00</td>
                </tr>
                <tr>

                    <td>Income</td>
                    <td>commit money</td>
                    <td>3768,00</td>
                </tr>
            </tbody>
        </table>

    </main>
</body>

</html>
